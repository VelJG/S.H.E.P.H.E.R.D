name: Deploy Frontend

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'shepherd-frontend/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      AWS_REGION: ap-southeast-1
      STACK_NAME: ShepherdInfraStack
      FRONTEND_DIR: shepherd-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: shepherd-frontend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve stack outputs
        id: infra
        shell: bash
        run: |
          set -euo pipefail
          BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue | [0]" \
            --output text)

          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiGatewayUrl'].OutputValue | [0]" \
            --output text)

          DISTRIBUTION_ID=$(aws cloudformation list-stack-resources \
            --stack-name "$STACK_NAME" \
            --query "StackResourceSummaries[?starts_with(LogicalResourceId, 'FrontendDistribution') && ResourceType=='AWS::CloudFront::Distribution'].PhysicalResourceId | [0]" \
            --output text)

          echo "bucket_name=$BUCKET_NAME" >> "$GITHUB_OUTPUT"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DISTRIBUTION_ID" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        env:
          VITE_API_URL: ${{ steps.infra.outputs.api_url }}
        run: npm run build

      - name: Upload to S3
        run: |
          aws s3 sync "${FRONTEND_DIR}/dist" "s3://${{ steps.infra.outputs.bucket_name }}" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.infra.outputs.distribution_id }}" \
            --paths '/*'
